---
# Remove existing spoke resources for re-deployment

- name: Delete spoke namespace (removes all cluster resources)
  shell: |
    oc delete namespace {{ spoke_cluster_name }} --ignore-not-found --timeout=120s
  register: ns_delete
  changed_when: "'deleted' in ns_delete.stdout"
  failed_when: false

- name: Delete ClusterImageSet
  shell: |
    OCP_VER=$(oc get clusterversion version -o jsonpath='{.status.desired.version}' | cut -d. -f1-2)
    oc delete clusterimageset "${OCP_VER}.0" --ignore-not-found
  changed_when: false
  failed_when: false

- name: Destroy spoke VMs
  shell: |
    for i in $(seq 0 {{ spoke_ctlplanes - 1 }}); do
      sudo virsh destroy {{ spoke_cluster_name }}-master-${i} 2>/dev/null || true
      sudo virsh undefine {{ spoke_cluster_name }}-master-${i} --remove-all-storage 2>/dev/null || true
    done
  changed_when: true
  failed_when: false

- name: Remove spoke VM disk images
  file:
    path: "{{ spoke_vm_image_dir }}/{{ spoke_cluster_name }}-master-{{ item }}.qcow2"
    state: absent
  loop: "{{ range(spoke_ctlplanes) | list }}"
  become: true

- name: Remove spoke libvirt network
  shell: |
    sudo virsh net-destroy {{ spoke_network_name }} 2>/dev/null || true
    sudo virsh net-undefine {{ spoke_network_name }} 2>/dev/null || true
  changed_when: true
  failed_when: false

- name: Remove spoke credential directory
  file:
    path: "{{ spoke_auth_dir }}"
    state: absent

- name: Remove spoke /etc/hosts entry
  lineinfile:
    path: /etc/hosts
    regexp: "api.{{ spoke_cluster_name }}.{{ spoke_base_domain }}"
    state: absent
  become: true

- name: Display cleanup result
  debug:
    msg: "Spoke cluster '{{ spoke_cluster_name }}' resources cleaned up"