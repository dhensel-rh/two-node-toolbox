---
# Extract spoke cluster credentials and set up DNS for hypervisor access

- name: Create spoke credential directory
  file:
    path: "{{ spoke_auth_dir }}"
    state: directory
    mode: '0700'

- block:
    - name: Wait for admin-kubeconfig secret
      shell: |
        oc get secret {{ spoke_cluster_name }}-admin-kubeconfig \
          -n {{ spoke_cluster_name }} -o name 2>/dev/null
      register: kubeconfig_secret
      until: kubeconfig_secret.rc == 0
      retries: 10
      delay: 15
  rescue:
    - name: Collect kubeconfig secret timeout diagnostics
      shell: |
        echo "=== Secrets in namespace ==="
        oc get secrets -n {{ spoke_cluster_name }} 2>/dev/null
        echo ""
        echo "=== AgentClusterInstall State ==="
        oc get agentclusterinstall {{ spoke_cluster_name }} -n {{ spoke_cluster_name }} \
          -o jsonpath='{.status.debugInfo.state}' 2>/dev/null
      register: kube_secret_diag
      changed_when: false
      failed_when: false

    - name: Display kubeconfig secret timeout diagnostics
      debug:
        msg: "{{ kube_secret_diag.stdout }}"

    - name: Fail after kubeconfig secret timeout
      fail:
        msg: "admin-kubeconfig secret not found within timeout"

- name: Extract spoke kubeconfig
  shell: |
    oc get secret {{ spoke_cluster_name }}-admin-kubeconfig \
      -n {{ spoke_cluster_name }} \
      -o jsonpath='{.data.kubeconfig}' | base64 -d
  register: spoke_kubeconfig
  changed_when: false

- name: Save spoke kubeconfig
  copy:
    content: "{{ spoke_kubeconfig.stdout }}"
    dest: "{{ spoke_auth_dir }}/kubeconfig"
    mode: '0600'

- block:
    - name: Wait for admin-password secret
      shell: |
        oc get secret {{ spoke_cluster_name }}-admin-password \
          -n {{ spoke_cluster_name }} -o name 2>/dev/null
      register: password_secret
      until: password_secret.rc == 0
      retries: "{{ (spoke_credentials_timeout / 30) | int }}"
      delay: 30
  rescue:
    - name: Collect password secret timeout diagnostics
      shell: |
        echo "=== Secrets in namespace ==="
        oc get secrets -n {{ spoke_cluster_name }} 2>/dev/null
        echo ""
        echo "=== AgentClusterInstall State ==="
        oc get agentclusterinstall {{ spoke_cluster_name }} -n {{ spoke_cluster_name }} \
          -o jsonpath='{.status.debugInfo.state}' 2>/dev/null
      register: pwd_secret_diag
      changed_when: false
      failed_when: false

    - name: Display password secret timeout diagnostics
      debug:
        msg: "{{ pwd_secret_diag.stdout }}"

    - name: Fail after password secret timeout
      fail:
        msg: "admin-password secret not found within timeout"

- name: Extract spoke admin password
  shell: |
    oc get secret {{ spoke_cluster_name }}-admin-password \
      -n {{ spoke_cluster_name }} \
      -o jsonpath='{.data.password}' | base64 -d
  register: spoke_password
  changed_when: false

- name: Save spoke admin password
  copy:
    content: "{{ spoke_password.stdout }}"
    dest: "{{ spoke_auth_dir }}/kubeadmin-password"
    mode: '0600'

- name: Add spoke API DNS to hypervisor /etc/hosts
  lineinfile:
    path: /etc/hosts
    regexp: "api.{{ spoke_cluster_name }}.{{ spoke_base_domain }}"
    line: "{{ spoke_api_vip }} api.{{ spoke_cluster_name }}.{{ spoke_base_domain }} api-int.{{ spoke_cluster_name }}.{{ spoke_base_domain }}"
    state: present
  become: true

- name: Ensure spoke VMs are running
  shell: |
    STATE=$(virsh domstate {{ spoke_cluster_name }}-master-{{ item }} 2>/dev/null)
    if [ "$STATE" != "running" ]; then
      virsh start {{ spoke_cluster_name }}-master-{{ item }}
      echo "STARTED"
    else
      echo "ALREADY_RUNNING"
    fi
  loop: "{{ range(spoke_ctlplanes) | list }}"
  register: vm_start_result
  changed_when: "'STARTED' in vm_start_result.stdout"
  become: true

- name: Wait for spoke VMs to boot
  pause:
    seconds: 120
  when: vm_start_result.results | selectattr('stdout', 'search', 'STARTED') | list | length > 0

- block:
    - name: Verify spoke cluster access
      shell: |
        KUBECONFIG={{ spoke_auth_dir }}/kubeconfig oc get nodes
      register: spoke_nodes
      changed_when: false
      retries: 20
      delay: 30
      until: spoke_nodes.rc == 0
  rescue:
    - name: Collect spoke access timeout diagnostics
      shell: |
        echo "=== VM Status ==="
        sudo virsh list --all 2>/dev/null | grep {{ spoke_cluster_name }} || echo "No spoke VMs found"
        echo ""
        echo "=== Last oc error ==="
        KUBECONFIG={{ spoke_auth_dir }}/kubeconfig oc get nodes 2>&1 || true
      register: spoke_access_diag
      changed_when: false
      failed_when: false

    - name: Display spoke access timeout diagnostics
      debug:
        msg: "{{ spoke_access_diag.stdout }}"

    - name: Fail after spoke access timeout
      fail:
        msg: "Could not access spoke cluster within timeout"

- name: Display spoke cluster nodes
  debug:
    msg: "{{ spoke_nodes.stdout }}"

- name: Set spoke kubeconfig path as fact for post-deployment tasks
  set_fact:
    spoke_kubeconfig_path: "{{ spoke_auth_dir }}/kubeconfig"
    spoke_kubeadmin_password_path: "{{ spoke_auth_dir }}/kubeadmin-password"
