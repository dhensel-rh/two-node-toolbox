---
# Monitor BMH provisioning, agent registration, and installation progress

- name: Wait for agents to register
  shell: |
    oc get agents -n {{ spoke_cluster_name }} --no-headers 2>/dev/null | wc -l
  register: agent_count
  until: agent_count.stdout | int >= spoke_ctlplanes
  retries: "{{ (spoke_agent_register_timeout / 30) | int }}"
  delay: 30

- name: Display registered agents
  shell: |
    oc get agents -n {{ spoke_cluster_name }}
  register: agents_info
  changed_when: false

- name: Show registered agents
  debug:
    msg: "{{ agents_info.stdout }}"

- name: Wait for spoke cluster installation to complete
  shell: |
    ACI_STATE=$(oc get agentclusterinstall {{ spoke_cluster_name }} \
      -n {{ spoke_cluster_name }} \
      -o jsonpath='{.status.debugInfo.state}' 2>/dev/null)
    echo "$ACI_STATE"
    case "$ACI_STATE" in
      adding-hosts|installed)
        exit 0
        ;;
      error|failed)
        echo "INSTALL FAILED"
        oc get agentclusterinstall {{ spoke_cluster_name }} \
          -n {{ spoke_cluster_name }} \
          -o jsonpath='{.status.conditions}' 2>/dev/null | python3 -m json.tool
        exit 2
        ;;
      *)
        exit 1
        ;;
    esac
  register: install_state
  until: install_state.rc == 0
  retries: "{{ (spoke_install_timeout / 30) | int }}"
  delay: 30
  failed_when: install_state.rc == 2

- name: Display final installation state
  debug:
    msg: "Spoke cluster installation state: {{ install_state.stdout_lines[0] }}"

- name: Wait for all agents to reach Done stage
  shell: |
    oc get agents -n {{ spoke_cluster_name }} -o json 2>/dev/null \
      | python3 -c "
    import json
    import sys

    data = json.load(sys.stdin)
    agents = data.get('items', [])
    total = len(agents)
    done = 0
    stuck = []
    for a in agents:
        stage = a.get('status', {}).get('progress', {}).get('currentStage', 'unknown')
        if stage == 'Done':
            done += 1
        else:
            state = a.get('status', {}).get('debugInfo', {}).get('state', 'unknown')
            hostname = a.get('spec', {}).get('hostname', 'unknown')
            stuck.append(f'{hostname}: state={state}, stage={stage}')

    print(f'Agents Done: {done} / {total}')
    for s in stuck:
        print(f'  {s}')
    sys.exit(0 if done == total else 1)
    "
  register: agents_done
  until: agents_done.rc == 0
  retries: "{{ (spoke_install_timeout / 30) | int }}"
  delay: 30
  changed_when: false

- name: Display final agent status
  shell: |
    oc get agents -n {{ spoke_cluster_name }}
  register: final_agents
  changed_when: false

- name: Show final agents
  debug:
    msg: "{{ final_agents.stdout }}"

- name: Display final BMH status
  shell: |
    oc get bmh -n {{ spoke_cluster_name }}
  register: final_bmh
  changed_when: false

- name: Show final BMH
  debug:
    msg: "{{ final_bmh.stdout }}"