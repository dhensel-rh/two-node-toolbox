---
- name: Read config file to check for CI registry usage
  set_fact:
    config_content: "{{ lookup('file', config_file[method]) }}"
  delegate_to: localhost
  become: false

- name: Parse pull secret JSON
  block:
    - name: Read pull secret to check for CI registry auth
      set_fact:
        pull_secret_content: "{{ lookup('file', 'pull-secret.json') | from_json }}"
      delegate_to: localhost
      become: false
  rescue:
    - name: Fail with pull secret parse error
      fail:
        msg: >-
          Failed to parse pull-secret.json. Ensure the file contains valid JSON.
          You can validate it with: python3 -m json.tool pull-secret.json

- name: Extract AGENT_E2E_TEST_SCENARIO from config file
  set_fact:
    config_scenario: "{{ config_content | regex_findall('(?m)^export AGENT_E2E_TEST_SCENARIO=\"([^\"]+)\"') | first | default('', true) }}"

- name: Fail if agent method is used without AGENT_E2E_TEST_SCENARIO
  fail:
    msg: >-
      Config file {{ config_file[method] }} does not set AGENT_E2E_TEST_SCENARIO,
      which is required for the agent installation method. Add
      AGENT_E2E_TEST_SCENARIO="TNF_IPV4" (fencing) or "TNA_IPV4" (arbiter) to
      the config file.
  when:
    - method == "agent"
    - config_scenario | length == 0

- name: Validate config scenario matches requested topology
  vars:
    scenario_prefix: "{{ config_scenario.split('_') | first }}"
    expected_prefix:
      arbiter: "TNA"
      fencing: "TNF"
  fail:
    msg: >-
      Config file {{ config_file[method] }} has AGENT_E2E_TEST_SCENARIO="{{ config_scenario }}"
      (prefix {{ scenario_prefix }}) but the requested topology is "{{ topology }}"
      which expects prefix "{{ expected_prefix[topology] | default('UNKNOWN') }}".
      This would deploy the wrong cluster type. Fix AGENT_E2E_TEST_SCENARIO in the config file.
  when:
    - method == "agent"
    - config_scenario | length > 0
    - topology in expected_prefix
    - scenario_prefix != expected_prefix[topology]

- name: Warn if using CI registry images without CI auth in pull secret
  fail:
    msg: >-
      Your config uses a CI registry image (registry.ci.openshift.org) but your
      pull secret does not include credentials for registry.ci.openshift.org.
      Either add CI registry credentials to your pull secret or switch to a
      public release image (e.g. quay.io/openshift-release-dev/ocp-release).
      See the setup guide for instructions on obtaining CI registry credentials.
  when:
    - "'registry.ci.openshift.org' in config_content"
    - "'registry.ci.openshift.org' not in (pull_secret_content.auths | default({}) | list)"

- name: Extract CI_TOKEN from config file
  set_fact:
    ci_token: "{{ config_content | regex_findall('(?m)^export CI_TOKEN=\"([^\"]+)\"') | first | default('', true) }}"
  no_log: true

- name: Extract release image registry
  set_fact:
    release_registry: "{{ config_content | regex_findall('(?m)^export OPENSHIFT_RELEASE_IMAGE=\"?([^/\"]+)') | first | default('', true) }}"
  when: ci_token | length > 0

- name: Validate CI token against release image registry
  uri:
    url: "https://{{ release_registry }}/v2/"
    headers:
      Authorization: "Bearer {{ ci_token }}"
    validate_certs: true
    status_code: [200]
  delegate_to: localhost
  become: false
  register: ci_login_result
  ignore_errors: true
  no_log: true
  when:
    - ci_token | length > 0
    - release_registry | default('') == 'registry.ci.openshift.org'

- name: Fail fast if CI token is expired or invalid
  fail:
    msg: >-
      CI token is invalid or expired for {{ release_registry }}.
      Update CI_TOKEN in {{ config_file[method] }} and retry.
  when:
    - ci_login_result is defined
    - ci_login_result is failed

- name: Copy pull secrets
  copy:
    dest: "{{dev_scripts_path}}/pull_secret.json"
    src: pull-secret.json

- name: Get username
  command: whoami
  changed_when: false
  become: false
  register: whoami

- name: Configure dev-scripts
  copy:
    dest: "{{dev_scripts_path}}/config_{{whoami.stdout}}.sh"
    src: "{{config_file[method]}}"
  register: dev_scripts_config

- name: Install dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - runc
      - containernetworking-plugins
    state: present
  become: true
